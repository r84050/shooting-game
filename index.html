<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skeleton Shooter</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#1a0e00;
  display:flex;align-items:center;justify-content:center;
  height:100dvh;overflow:hidden;
  font-family:'Press Start 2P',monospace;
  touch-action:none;user-select:none;
}
canvas#gc{display:block;}
#hud{
  position:fixed;top:0;left:0;right:0;
  padding:8px 12px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;pointer-events:none;
}
.hb{
  background:rgba(0,0,0,0.65);border:1px solid #c8a060;
  border-radius:4px;padding:4px 8px;
  font-size:7px;color:#f0d090;text-shadow:0 0 6px #c87830;
}
#hp-bar{width:80px;height:8px;background:#333;border:1px solid #c8a060;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:5px;}
#hp-fill{height:100%;background:linear-gradient(90deg,#ff4444,#ff8844);transition:width 0.15s;}
.screen{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:30;background:radial-gradient(ellipse at 50% 30%, #2a1500 0%, #0d0700 70%);
}
.screen.hidden{display:none;}
.stitle{
  font-size:clamp(14px,4vw,24px);color:#f0a030;
  text-shadow:0 0 20px #c87020,0 0 40px #80400088;
  margin-bottom:6px;letter-spacing:2px;text-align:center;
  animation:flicker 3s ease infinite;
}
.ssub{font-size:clamp(6px,2vw,9px);color:#c08040;margin-bottom:28px;letter-spacing:1px;}
.btn{
  font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,11px);
  padding:12px 24px;border:2px solid #c87030;background:transparent;color:#f0a040;
  border-radius:3px;cursor:pointer;letter-spacing:1px;text-shadow:0 0 8px #c87030;
  box-shadow:0 0 14px #c8703044;margin:5px;transition:all 0.12s;
}
.btn:active{background:#c8703022;transform:scale(0.95);}
.score-big{font-size:clamp(26px,7vw,48px);color:#f0a030;text-shadow:0 0 20px #c87020;margin:10px 0;}
.srow{font-size:7px;color:#998877;margin:3px 0;} .srow span{color:#f0c060;}
#ctrl{position:fixed;bottom:0;left:0;right:0;height:170px;z-index:15;pointer-events:none;}
#jz{position:absolute;bottom:20px;left:20px;width:120px;height:120px;pointer-events:all;}
#jbase{width:120px;height:120px;border-radius:50%;border:2px solid #c8703066;background:rgba(200,112,48,0.07);position:relative;display:flex;align-items:center;justify-content:center;}
#jthumb{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,#c8703099,#c8703033);border:2px solid #c87030;box-shadow:0 0 10px #c8703088;position:absolute;}
#fbtn{
  position:absolute;bottom:28px;right:28px;width:86px;height:86px;border-radius:50%;
  border:3px solid #ff5533;background:rgba(255,85,51,0.1);box-shadow:0 0 18px #ff553366;
  pointer-events:all;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#ff6644;text-shadow:0 0 6px #ff5533;transition:all 0.08s;
}
#fbtn.active{background:rgba(255,85,51,0.35);box-shadow:0 0 32px #ff5533;transform:scale(0.92);}
@keyframes flicker{0%,100%{opacity:1;}50%{opacity:0.75;}92%{opacity:1;}94%{opacity:0.5;}96%{opacity:1;}}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:50;}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<div id="hud" class="hidden">
  <div class="hb">❤ <div id="hp-bar"><div id="hp-fill"></div></div></div>
  <div class="hb">SCORE <span id="sv">0</span></div>
  <div class="hb">WAVE <span id="wv" style="color:#ffcc00">1</span></div>
</div>

<div id="ctrl" class="hidden">
  <div id="jz"><div id="jbase"><div id="jthumb"></div></div></div>
  <div id="fbtn">FIRE</div>
</div>

<div class="screen" id="ss">
  <div class="stitle">☠ SKELETON<br>SHOOTER ☠</div>
  <div class="ssub">KNIGHT vs THE DEAD HORDE</div>
  <div style="font-size:48px;margin:12px 0;filter:drop-shadow(0 0 12px #c87030)">⚔️💀🏜️</div>
  <button class="btn" onclick="startGame()">▶ START</button>
  <div style="margin-top:18px;font-size:6px;color:#665544;letter-spacing:1px;line-height:2.2;text-align:center;">
    MOVE: JOYSTICK / WASD+ARROWS<br>FIRE: BUTTON / SPACE<br>AUTO-AIM: ON
  </div>
</div>

<div class="screen hidden" id="gos">
  <div class="stitle" style="color:#ff5533;text-shadow:0 0 20px #ff3311;">SLAIN!</div>
  <div class="score-big" id="fs">0</div>
  <div class="srow">WAVE: <span id="fw">1</span></div>
  <div class="srow">KILLS: <span id="fk">0</span></div>
  <div style="margin-top:22px;">
    <button class="btn" onclick="startGame()">↺ RETRY</button>
    <button class="btn" style="border-color:#c0c0c0;color:#d0d0d0;" onclick="showMenu()">⌂ MENU</button>
  </div>
</div>

<script>
if(window.Telegram&&window.Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}

const C=document.getElementById('gc');
const X=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();
window.addEventListener('resize',()=>{resize();if(gs==='play'){cam.x=Math.max(0,Math.min(worldW-W,pl.x-W/2));cam.y=Math.max(0,Math.min(worldH-H,pl.y-H/2));}});

let gs='menu';
let score=0,wave=1,kills=0,raf;

// Camera
let cam={x:0,y:0};

// World
const TILE=48;
const FIRE_RATE=15; // from GunShoot.cs: fireRate=0.25f
const WEAPON_RANGE=310;
const PLAYER_SPEED=3.2;
let worldW=1400,worldH=1200;
let tiles=[],props=[];

function initWorld(){
  worldW=Math.max(1400,W*2.2);
  worldH=Math.max(1200,H*2.2);
  tiles=[];props=[];
  const tc=['sand','sand','sand','dark','light'];
  for(let ty=0;ty<Math.ceil(worldH/TILE)+1;ty++)
    for(let tx=0;tx<Math.ceil(worldW/TILE)+1;tx++)
      tiles.push({tx,ty,type:tc[Math.floor(Math.random()*tc.length)]});
  const pTypes=['rock','rock','barrel','cactus','ruin'];
  for(let i=0;i<50;i++){
    const px=80+Math.random()*(worldW-160);
    const py=80+Math.random()*(worldH-160);
    const pt=pTypes[Math.floor(Math.random()*pTypes.length)];
    const sz=pt==='ruin'?32+Math.random()*18:pt==='rock'?16+Math.random()*14:12+Math.random()*8;
    props.push({x:px,y:py,w:sz,h:sz,type:pt,seed:Math.random()*100});
  }
}

// Player
let pl={};
function resetPlayer(){
  pl={x:worldW/2,y:worldH/2,vx:0,vy:0,hp:100,maxHp:100,
    angle:0,state:'idle',animT:0,animF:0,invTimer:0,shootTimer:0};
}

// Skeletons
let skels=[],spawnTimer=0,skelLeft=0,waveCleared=false;
function skelCount(){return 4+wave*2;}
function skelSpeed(){return 1.1+wave*0.1;}
function skelHp(){return 2+Math.floor(wave/2);}
function spawnInterval(){return Math.max(50,110-wave*8);}

function spawnSkel(){
  if(skelLeft<=0)return;skelLeft--;
  let sx,sy,side=Math.floor(Math.random()*4);
  if(side===0){sx=Math.random()*worldW;sy=10;}
  else if(side===1){sx=worldW-10;sy=Math.random()*worldH;}
  else if(side===2){sx=Math.random()*worldW;sy=worldH-10;}
  else{sx=10;sy=Math.random()*worldH;}
  const hp=skelHp();
  skels.push({x:sx,y:sy,angle:0,speed:skelSpeed()*(0.85+Math.random()*0.3),
    hp,maxHp:hp,animT:0,animF:0,attackCd:0,attackTimer:0,hitFlash:0,
    swordRange:44,dead:false});
}

// Effects
let shots=[],hitFx=[],parts=[],floats=[];
function spawnParts(x,y,col,n,sp){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28,s=sp*(0.5+Math.random());
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:22+Math.random()*15,max:38,r:2+Math.random()*3,col});
  }
}
function addFloat(x,y,txt,col){floats.push({x,y,txt,col,life:52,max:52,vy:-1.1});}

// Banner
let banner={show:false,timer:0,txt:''};
function showBanner(t){banner={show:true,timer:140,txt:t};}

// ── DRAW TILES ──
const sandCols=['#c8a060','#d4b070','#c09050'];
const darkCols=['#b08040','#986830','#a07838'];
const lightCols=['#dcc080','#e8cc90','#d0b870'];

function drawTiles(){
  const startTX=Math.floor(cam.x/TILE),startTY=Math.floor(cam.y/TILE);
  const endTX=Math.ceil((cam.x+W)/TILE),endTY=Math.ceil((cam.y+H)/TILE);
  for(let ty=startTY-1;ty<=endTY+1;ty++){
    for(let tx=startTX-1;tx<=endTX+1;tx++){
      const sx=tx*TILE-cam.x,sy=ty*TILE-cam.y;
      const cols_=Math.ceil(worldW/TILE);
      const rows_=Math.ceil(worldH/TILE);
      if(tx<0||ty<0||tx>=cols_||ty>=rows_){
        X.fillStyle='#6a4820';X.fillRect(sx,sy,TILE+1,TILE+1);continue;
      }
      const t=tiles[ty*cols_+tx];
      let col=sandCols[Math.abs(tx*7+ty*13)%3];
      if(t&&t.type==='dark')col=darkCols[Math.abs(tx*5+ty*11)%3];
      if(t&&t.type==='light')col=lightCols[Math.abs(tx*3+ty*9)%3];
      X.fillStyle=col;X.fillRect(sx,sy,TILE+1,TILE+1);
      if((tx*17+ty*23)%5===0){
        X.fillStyle='rgba(0,0,0,0.07)';
        X.fillRect(sx+6,sy+8,TILE-12,2);X.fillRect(sx+10,sy+18,TILE-20,1);
      }
    }
  }
}

function toS(wx,wy){return{x:wx-cam.x,y:wy-cam.y};}

// ── DRAW PROPS ──
function drawProps(){
  props.forEach(p=>{
    const s=toS(p.x,p.y);
    if(s.x<-100||s.x>W+100||s.y<-100||s.y>H+100)return;
    X.save();X.translate(s.x,s.y);
    // Shadow
    X.globalAlpha=0.22;X.fillStyle='#000';
    X.beginPath();X.ellipse(p.w*0.25,p.h*0.4,p.w*0.75,p.h*0.28,0,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
    if(p.type==='rock'){
      X.fillStyle='#8a7055';X.beginPath();X.ellipse(0,0,p.w,p.h*0.65,0.3,0,Math.PI*2);X.fill();
      X.fillStyle='#6a5040';X.beginPath();X.ellipse(-p.w*0.15,p.h*0.1,p.w*0.38,p.h*0.24,0.5,0,Math.PI*2);X.fill();
      X.fillStyle='rgba(255,255,255,0.1)';X.beginPath();X.ellipse(-p.w*0.2,-p.h*0.2,p.w*0.22,p.h*0.14,-0.3,0,Math.PI*2);X.fill();
    }else if(p.type==='barrel'){
      X.fillStyle='#704828';X.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      X.strokeStyle='#3a2010';X.lineWidth=2;X.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
      X.fillStyle='#3a2010';X.fillRect(-p.w/2,-2,p.w,3);X.fillRect(-p.w/2,6,p.w,3);
    }else if(p.type==='cactus'){
      X.fillStyle='#487030';X.fillRect(-5,-p.h,10,p.h);
      X.fillRect(-p.w*0.5,-p.h*0.55,p.w*0.5,7);X.fillRect(3,-p.h*0.7,p.w*0.5,7);
    }else if(p.type==='ruin'){
      X.fillStyle='#b09060';X.fillRect(-p.w/2,-p.h,p.w,p.h);
      X.fillStyle='#8a6840';X.fillRect(-p.w/2,-p.h,p.w,7);
      X.fillStyle='rgba(0,0,0,0.2)';X.fillRect(-p.w*0.1,-p.h*0.55,p.w*0.2,p.h*0.42);
    }
    X.restore();
  });
}

// ── KNIGHT (top-down) ──
function drawKnight(x,y,angle,state,frame,inv,atkT){
  X.save();X.translate(x,y);
  if(inv>0&&Math.floor(inv/4)%2===0)X.globalAlpha=0.35;
  const sz=22;
  X.fillStyle='rgba(0,0,0,0.28)';
  X.beginPath();X.ellipse(0,6,sz*0.9,sz*0.35,0,0,Math.PI*2);X.fill();
  X.rotate(angle);
  const lb=state==='run'?Math.sin(frame*0.48)*5:0;
  // Legs
  X.fillStyle='#4455aa';
  X.beginPath();X.ellipse(-7,12+lb,6,7,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(7,12-lb,6,7,0,0,Math.PI*2);X.fill();
  X.fillStyle='#223';
  X.beginPath();X.ellipse(-7,17+lb,5,4,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(7,17-lb,5,4,0,0,Math.PI*2);X.fill();
  // Cape
  X.fillStyle='#aa2222';
  X.beginPath();X.ellipse(0,8,13,14,0,0,Math.PI*2);X.fill();
  // Armor
  X.fillStyle='#5566cc';X.beginPath();X.ellipse(0,2,12,12,0,0,Math.PI*2);X.fill();
  X.fillStyle='#6677dd';X.beginPath();X.ellipse(-2,-1,5,5,0,0,Math.PI*2);X.fill();
  // Shield
  X.fillStyle='#cc3333';X.beginPath();X.ellipse(-sz*0.55,2,8,10,-0.4,0,Math.PI*2);X.fill();
  X.strokeStyle='#ffcc00';X.lineWidth=1.5;X.stroke();
  // Sword
  const ext=atkT>6?sz*0.92:sz*0.65;
  X.fillStyle='#5566cc';X.beginPath();X.ellipse(sz*0.45,2,6,7,0,0,Math.PI*2);X.fill();
  X.save();X.shadowColor='#ffffff';X.shadowBlur=atkT>6?14:6;
  X.strokeStyle='#ddeeff';X.lineWidth=3;
  X.beginPath();X.moveTo(sz*0.45,2);X.lineTo(ext,2);X.stroke();
  X.restore();
  X.fillStyle='#ddeeff';X.beginPath();X.arc(ext,2,3,0,Math.PI*2);X.fill();
  // Helmet
  X.fillStyle='#667799';X.beginPath();X.arc(0,-2,sz*0.5,0,Math.PI*2);X.fill();
  X.fillStyle='#445577';X.fillRect(-sz*0.38,sz*0.04,sz*0.76,sz*0.2);
  X.fillStyle='#ff4466';
  X.beginPath();X.moveTo(0,-sz*0.52);X.quadraticCurveTo(-sz*0.25,-sz*0.6,0,-sz*0.3);X.fill();
  X.fillStyle='#ffcc00';
  X.fillRect(-sz*0.22,sz*0.07,sz*0.16,sz*0.08);
  X.fillRect(sz*0.06,sz*0.07,sz*0.16,sz*0.08);
  // Muzzle flash
  if(atkT>8){
    X.save();X.globalAlpha=(atkT-8)/7*0.85;
    X.shadowColor='#ffee44';X.shadowBlur=22;X.fillStyle='#ffee44';
    X.beginPath();X.arc(ext+6,2,8,0,Math.PI*2);X.fill();X.restore();
  }
  X.restore();
}

// ── SKELETON ──
function drawSkeleton(sk){
  const s=toS(sk.x,sk.y);
  if(s.x<-70||s.x>W+70||s.y<-70||s.y>H+70)return;
  X.save();X.translate(s.x,s.y);
  if(sk.hitFlash>0)X.filter=`brightness(${2.5-sk.hitFlash*0.1})`;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.28)';
  X.beginPath();X.ellipse(0,7,16,7,0,0,Math.PI*2);X.fill();
  X.filter='none';
  if(sk.hitFlash>0)X.filter=`brightness(${2.5-sk.hitFlash*0.1})`;
  X.rotate(sk.angle);
  const f=sk.animF,bob=Math.sin(f*0.5)*2,leg=Math.sin(f*0.5)*6,arm=Math.sin(f*0.5+Math.PI)*5;
  const sz=18;
  // Legs
  X.fillStyle='#b8d8b0';
  X.beginPath();X.ellipse(-6,10+leg,5,6,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(6,10-leg,5,6,0,0,Math.PI*2);X.fill();
  X.fillStyle='#d0e8c8';
  X.beginPath();X.ellipse(-6,15+leg,4,3,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(6,15-leg,4,3,0,0,Math.PI*2);X.fill();
  // Body/ribcage
  X.fillStyle='#c8e0c0';X.beginPath();X.ellipse(0,1+bob,10,11,0,0,Math.PI*2);X.fill();
  X.strokeStyle='#a0c098';X.lineWidth=1;
  for(let r=0;r<3;r++){X.beginPath();X.ellipse(0,(r-1)*3.5+bob,9,3,0,-0.8,0.8,false);X.stroke();}
  X.fillStyle='#a0c098';X.fillRect(-2,-8+bob,4,16);
  // Arms
  X.fillStyle='#b8d8b0';
  X.beginPath();X.ellipse(-sz*0.55,0+arm,5,6,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(sz*0.55,0-arm,5,6,0,0,Math.PI*2);X.fill();
  // Sword (Skeleton.prefab: Sword child tagged "Sword")
  const sw=sk.attackTimer>0?-0.7+sk.attackTimer*0.04:0.1;
  X.save();X.rotate(sw);
  X.save();X.shadowColor='#44ff88';X.shadowBlur=sk.attackTimer>0?12:4;
  X.strokeStyle='#ccddcc';X.lineWidth=3;
  X.beginPath();X.moveTo(sz*0.5,-2-arm);X.lineTo(sz*1.05,-2-arm);X.stroke();
  X.restore();
  X.strokeStyle='#aabbaa';X.lineWidth=1.5;
  X.beginPath();X.moveTo(sz*0.48,-5-arm);X.lineTo(sz*0.48,2-arm);X.stroke();
  X.restore();
  // Skull
  X.fillStyle='#d0e8c8';X.beginPath();X.arc(0,-3+bob,sz*0.48,0,Math.PI*2);X.fill();
  X.fillStyle='#b0c8a8';X.fillRect(-sz*0.3,-0.5+bob,sz*0.6,sz*0.28);
  X.fillStyle='#fff';
  for(let t=0;t<4;t++)X.fillRect(-sz*0.24+t*sz*0.12,sz*0.04+bob,sz*0.08,sz*0.1);
  X.fillStyle='#112211';
  X.beginPath();X.ellipse(-sz*0.2,-sz*0.22+bob,sz*0.12,sz*0.1,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(sz*0.2,-sz*0.22+bob,sz*0.12,sz*0.1,0,0,Math.PI*2);X.fill();
  X.fillStyle='#ff2200';X.shadowColor='#ff2200';X.shadowBlur=10;
  X.beginPath();X.arc(-sz*0.2,-sz*0.22+bob,sz*0.06,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(sz*0.2,-sz*0.22+bob,sz*0.06,0,Math.PI*2);X.fill();
  // Health bar (HealthBarSkeleton from prefab)
  X.shadowBlur=0;X.filter='none';
  const bw=38,bh=5,bx=-19,by=-35;
  X.fillStyle='#2a1a00';X.fillRect(bx-1,by-1,bw+2,bh+2);
  X.fillStyle='#440000';X.fillRect(bx,by,bw,bh);
  X.fillStyle=sk.hp/sk.maxHp>0.5?'#44cc44':'#cc4444';
  X.fillRect(bx,by,bw*(sk.hp/sk.maxHp),bh);
  X.strokeStyle='#c8a060';X.lineWidth=1;X.strokeRect(bx,by,bw,bh);
  X.restore();
}

function drawShots(){
  shots.forEach(s=>{
    const a=s.life/8;
    X.save();X.globalAlpha=Math.min(1,a*1.5);
    X.strokeStyle='#ffee44';X.lineWidth=a*3;
    X.shadowColor='#ffcc00';X.shadowBlur=10*a;
    X.beginPath();X.moveTo(s.x1-cam.x,s.y1-cam.y);X.lineTo(s.x2-cam.x,s.y2-cam.y);X.stroke();
    X.restore();
  });
}

function drawHitFx(){
  hitFx.forEach(h=>{
    const s=toS(h.x,h.y);const a=h.life/h.max;
    X.save();X.globalAlpha=a;X.shadowColor='#ff4422';X.shadowBlur=14*a;
    for(let i=0;i<5;i++){
      const ang=i*1.26+h.seed,r=10*(1-a)+4;
      X.fillStyle='#cc2200';X.beginPath();X.arc(s.x+Math.cos(ang)*r,s.y+Math.sin(ang)*r,3*a+1,0,Math.PI*2);X.fill();
    }
    X.restore();
  });
}

function drawParts(){
  parts.forEach(p=>{
    const a=p.life/p.max;
    X.save();X.globalAlpha=a;X.fillStyle=p.col;X.shadowColor=p.col;X.shadowBlur=5;
    X.beginPath();X.arc(p.x-cam.x,p.y-cam.y,p.r*a,0,Math.PI*2);X.fill();X.restore();
  });
}

function drawFloats(){
  floats.forEach(f=>{
    const a=f.life/f.max;
    X.save();X.globalAlpha=a;X.font=`bold 8px 'Press Start 2P',monospace`;
    X.fillStyle=f.col;X.textAlign='center';
    X.fillText(f.txt,f.x-cam.x,f.y-cam.y);X.restore();
  });
}

function drawBanner(){
  if(!banner.show)return;
  const a=Math.min(1,banner.timer/30);
  X.save();X.globalAlpha=a;
  X.fillStyle='rgba(0,0,0,0.72)';X.fillRect(0,H/2-28,W,56);
  X.font=`12px 'Press Start 2P',monospace`;
  X.fillStyle='#f0a030';X.textAlign='center';
  X.shadowColor='#f0a030';X.shadowBlur=18;
  X.fillText(banner.txt,W/2,H/2+5);
  X.restore();
  banner.timer--;if(banner.timer<=0)banner.show=false;
}

function drawMinimap(){
  const mw=72,mh=56,mx=W-mw-8,my=8;
  X.save();X.globalAlpha=0.72;
  X.fillStyle='rgba(10,5,0,0.7)';X.fillRect(mx,my,mw,mh);
  X.strokeStyle='#c8a060';X.lineWidth=1;X.strokeRect(mx,my,mw,mh);
  const sx=mw/worldW,sy=mh/worldH;
  X.fillStyle='#8a6840';props.forEach(p=>X.fillRect(mx+p.x*sx-1,my+p.y*sy-1,2,2));
  X.fillStyle='#ff4444';skels.forEach(s=>X.fillRect(mx+s.x*sx-2,my+s.y*sy-2,3,3));
  X.fillStyle='#4488ff';X.beginPath();X.arc(mx+pl.x*sx,my+pl.y*sy,3,0,Math.PI*2);X.fill();
  X.strokeStyle='rgba(255,255,255,0.25)';X.lineWidth=1;
  X.strokeRect(mx+cam.x*sx,my+cam.y*sy,W*sx,H*sy);
  X.restore();
}

function drawVignette(){
  const g=X.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,H*0.78);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(10,5,0,0.48)');
  X.fillStyle=g;X.fillRect(0,0,W,H);
}

function updateJ(t){
  const r=jbase.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  let dx=t.clientX-cx,dy=t.clientY-cy;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>JR){dx=dx/d*JR;dy=dy/d*JR;}
  jDX=dx/JR;jDY=dy/JR;
  jth.style.left=(r.width/2+dx)+'px';jth.style.top=(r.height/2+dy)+'px';jth.style.transform='translate(-50%,-50%)';
}
